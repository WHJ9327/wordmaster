<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordMaster - 智能单词背诵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#409EFF;--primary-dark:#337ecc;--primary-light:#ECF5FF;
  --success:#67C23A;--success-light:#F0F9EB;
  --danger:#F56C6C;--danger-light:#FEF0F0;
  --warning:#E6A23C;--warning-light:#FDF6EC;
  --text-primary:#303133;--text-regular:#606266;--text-secondary:#909399;--text-placeholder:#C0C4CC;
  --border:#DCDFE6;--border-light:#E4E7ED;
  --bg:#F5F7FA;--bg-dark:#E9ECF1;--white:#FFFFFF;
  --shadow:0 2px 12px rgba(0,0,0,.1);--shadow-light:0 2px 8px rgba(0,0,0,.06);
  --radius:8px;--radius-lg:12px;
  --sidebar-w:240px;
  --header-h:60px;
}
html,body{height:100%;width:100%;}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.6;overflow:hidden;}
a{text-decoration:none;color:var(--primary);}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,select,textarea{font-family:inherit;outline:none;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#C0C4CC;border-radius:3px;}
::-webkit-scrollbar-track{background:transparent;}
.auth-page{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);position:relative;overflow:hidden;}
.auth-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:rgba(255,255,255,.05);top:-200px;right:-100px;}
.auth-page::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-150px;left:-50px;}
.auth-card{background:var(--white);border-radius:var(--radius-lg);padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative;z-index:1;animation:slideUp .5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.auth-card h1{text-align:center;font-size:28px;margin-bottom:8px;color:var(--text-primary);}
.auth-card .subtitle{text-align:center;color:var(--text-secondary);margin-bottom:32px;font-size:14px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:14px;color:var(--text-regular);margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;transition:border-color .3s;background:var(--white);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(64,158,255,.2);}
.btn{padding:10px 24px;border-radius:6px;font-size:14px;font-weight:500;transition:all .3s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(64,158,255,.4);}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{background:#5daf34;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#e45656;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-warning:hover{background:#cf9236;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-regular);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-block{width:100%;padding:12px;}
.btn-lg{padding:14px 32px;font-size:16px;border-radius:8px;}
.btn-sm{padding:6px 14px;font-size:12px;}
.auth-card .btn-block{margin-top:8px;}
.auth-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary);}
.auth-switch a{cursor:pointer;font-weight:500;}
.app-layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#1a1f36 0%,#2d3561 100%);color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s;}
.sidebar-brand{padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-brand .logo{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}
.sidebar-brand h2{font-size:18px;font-weight:600;}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-item{padding:12px 24px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.7);font-size:14px;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(64,158,255,.2);color:#fff;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--primary);border-radius:0 3px 3px 0;}
.nav-item .icon{font-size:18px;width:24px;text-align:center;}
.sidebar-user{padding:16px 24px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px;}
.sidebar-user .avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;}
.sidebar-user .user-info{flex:1;min-width:0;}
.sidebar-user .user-info .name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user .user-info .goal{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.main-content{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow-y:auto;padding:24px 32px;}
.page-header{margin-bottom:24px;}
.page-header h1{font-size:24px;font-weight:600;color:var(--text-primary);}
.page-header p{color:var(--text-secondary);font-size:14px;margin-top:4px;}
.card{background:var(--white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-light);transition:box-shadow .3s;}
.card:hover{box-shadow:var(--shadow);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-header h3{font-size:16px;font-weight:600;}
.card-grid{display:grid;gap:20px;}
.card-grid-2{grid-template-columns:repeat(2,1fr);}
.card-grid-3{grid-template-columns:repeat(3,1fr);}
.card-grid-4{grid-template-columns:repeat(4,1fr);}
.stat-card{display:flex;align-items:center;gap:16px;padding:20px 24px;}
.stat-card .stat-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.stat-card .stat-info h4{font-size:28px;font-weight:700;line-height:1.2;}
.stat-card .stat-info p{font-size:13px;color:var(--text-secondary);}
.today-section{margin-top:24px;}
.chart-container{position:relative;height:260px;padding:10px 0;}
.quick-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
.quick-action-btn{padding:16px 24px;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .3s;border:1px solid var(--border);background:var(--white);min-width:140px;}
.quick-action-btn:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow);}
.quick-action-btn .qicon{font-size:28px;}
.quick-action-btn span{font-size:13px;color:var(--text-regular);}
.lib-card{cursor:pointer;transition:all .3s;border:2px solid transparent;position:relative;overflow:hidden;}
.lib-card:hover{border-color:var(--primary);transform:translateY(-3px);}
.lib-card .lib-badge{position:absolute;top:12px;right:12px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.lib-card .lib-badge.system{background:var(--primary-light);color:var(--primary);}
.lib-card .lib-badge.custom{background:var(--success-light);color:var(--success);}
.lib-card h3{font-size:16px;margin-bottom:8px;padding-right:60px;}
.lib-card .lib-meta{display:flex;gap:16px;font-size:13px;color:var(--text-secondary);margin-bottom:12px;}
.lib-card .lib-progress{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.lib-card .lib-progress-bar{height:100%;border-radius:2px;background:var(--primary);transition:width .5s;}
.lib-card .lib-progress-text{font-size:12px;color:var(--text-secondary);margin-top:6px;}
.lib-actions{display:flex;gap:8px;margin-top:12px;}
.study-page{height:calc(100vh - 48px);display:flex;flex-direction:column;padding:0 !important;}
.study-header{background:var(--white);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.study-header .back-btn{font-size:14px;color:var(--text-regular);cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;transition:background .2s;}
.study-header .back-btn:hover{background:var(--bg);}
.study-header .study-title{font-size:16px;font-weight:600;}
.study-header .study-progress{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--text-secondary);}
.study-header .study-progress .count{font-weight:600;color:var(--primary);font-size:18px;}
.study-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.word-card{width:100%;max-width:600px;min-height:380px;background:var(--white);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);padding:48px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:cardIn .4s ease;position:relative;}
@keyframes cardIn{from{opacity:0;transform:scale(.95) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.word-card .word-english{font-size:36px;font-weight:700;color:var(--text-primary);margin-bottom:8px;font-family:'Helvetica Neue',Arial,sans-serif;letter-spacing:.5px;}
.word-card .word-phonetic{font-size:16px;color:var(--text-secondary);margin-bottom:16px;font-family:'Helvetica Neue',Arial,sans-serif;}
.word-card .word-speak{width:44px;height:44px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .3s;margin-bottom:24px;border:none;}
.word-card .word-speak:hover{background:var(--primary);color:#fff;transform:scale(1.1);}
.word-card .word-meaning{font-size:18px;color:var(--text-primary);margin-bottom:12px;line-height:1.8;}
.word-card .word-example{font-size:14px;color:var(--text-secondary);font-style:italic;max-width:460px;line-height:1.6;}
.word-card .reveal-btn{margin-top:24px;padding:12px 48px;background:var(--primary);color:#fff;border-radius:24px;font-size:15px;cursor:pointer;transition:all .3s;border:none;}
.word-card .reveal-btn:hover{background:var(--primary-dark);transform:scale(1.05);}
.word-card .word-answer-area{margin-top:20px;width:100%;}
.word-card .word-answer-area input{width:100%;max-width:300px;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:18px;text-align:center;font-family:'Helvetica Neue',Arial,sans-serif;letter-spacing:1px;}
.word-card .word-answer-area input:focus{border-color:var(--primary);}
.word-card .word-answer-area input.correct{border-color:var(--success);background:var(--success-light);}
.word-card .word-answer-area input.wrong{border-color:var(--danger);background:var(--danger-light);}
.study-footer{padding:20px 32px;background:var(--white);border-top:1px solid var(--border-light);display:flex;justify-content:center;gap:16px;flex-shrink:0;}
.study-footer .action-btn{padding:14px 40px;border-radius:12px;font-size:15px;font-weight:600;transition:all .3s;min-width:130px;border:none;}
.study-footer .action-btn:hover{transform:translateY(-2px);}
.study-footer .btn-know{background:var(--success-light);color:var(--success);border:2px solid var(--success);}
.study-footer .btn-know:hover{background:var(--success);color:#fff;}
.study-footer .btn-fuzzy{background:var(--warning-light);color:var(--warning);border:2px solid var(--warning);}
.study-footer .btn-fuzzy:hover{background:var(--warning);color:#fff;}
.study-footer .btn-unknown{background:var(--danger-light);color:var(--danger);border:2px solid var(--danger);}
.study-footer .btn-unknown:hover{background:var(--danger);color:#fff;}
.study-complete{text-align:center;animation:cardIn .5s ease;}
.study-complete .complete-icon{font-size:80px;margin-bottom:16px;}
.study-complete h2{font-size:28px;margin-bottom:8px;}
.study-complete p{color:var(--text-secondary);font-size:16px;margin-bottom:24px;}
.study-complete .complete-stats{display:flex;justify-content:center;gap:40px;margin-bottom:32px;}
.study-complete .complete-stat{text-align:center;}
.study-complete .complete-stat h4{font-size:32px;font-weight:700;color:var(--primary);}
.study-complete .complete-stat p{font-size:13px;color:var(--text-secondary);}
.mode-switch{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;}
.mode-switch button{padding:6px 16px;border-radius:6px;font-size:13px;background:transparent;color:var(--text-secondary);border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
.mode-switch button.active{background:var(--white);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1);font-weight:500;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.stats-card{min-height:200px;}
canvas{max-width:100%;max-height:100%;}
.settings-section{margin-bottom:32px;}
.settings-section h3{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border-light);}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg);}
.setting-item label{font-size:14px;color:var(--text-regular);}
.setting-item .setting-control{display:flex;align-items:center;gap:8px;}
.toggle{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .3s;}
.toggle.active{background:var(--primary);}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.active::after{transform:translateX(20px);}
.number-input{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.number-input button{width:32px;height:32px;background:var(--bg);border:none;cursor:pointer;font-size:16px;color:var(--text-regular);display:flex;align-items:center;justify-content:center;}
.number-input button:hover{background:var(--bg-dark);}
.number-input span{width:48px;text-align:center;font-size:14px;font-weight:500;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:32px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;animation:slideUp .3s;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h2{font-size:20px;margin-bottom:20px;}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;}
.toast{position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;z-index:2000;animation:slideIn .3s;box-shadow:var(--shadow);}
@keyframes slideIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}
.toast.info{background:var(--primary);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);}
.empty-state .empty-icon{font-size:64px;margin-bottom:16px;opacity:.5;}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text-regular);}
.empty-state p{font-size:14px;margin-bottom:20px;}
.tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:500;}
.tag-blue{background:var(--primary-light);color:var(--primary);}
.tag-green{background:var(--success-light);color:var(--success);}
.tag-red{background:var(--danger-light);color:var(--danger);}
.tag-yellow{background:var(--warning-light);color:var(--warning);}
.progress-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0;}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
@media(max-width:1024px){
  .card-grid-3{grid-template-columns:repeat(2,1fr);}
  .card-grid-4{grid-template-columns:repeat(2,1fr);}
  .stats-grid{grid-template-columns:1fr;}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main-content{margin-left:0;padding:16px;}
  .card-grid-2,.card-grid-3,.card-grid-4{grid-template-columns:1fr;}
  .study-footer .action-btn{padding:12px 24px;min-width:100px;font-size:14px;}
  .word-card{padding:32px 24px;min-height:300px;}
  .word-card .word-english{font-size:28px;}
  .auth-card{padding:32px 24px;}
  .mobile-menu{display:block !important;}
}
.mobile-menu{display:none;position:fixed;top:12px;left:12px;z-index:101;width:40px;height:40px;background:var(--primary);border-radius:8px;color:#fff;font-size:20px;border:none;cursor:pointer;align-items:center;justify-content:center;}
.sidebar-close{display:none;position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
@media(max-width:768px){.sidebar-close{display:block;}}
.donut-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:12px;}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-regular);}
.donut-legend-item .dot{width:10px;height:10px;border-radius:50%;}
.word-list-table{width:100%;border-collapse:collapse;margin-top:12px;}
.word-list-table th,.word-list-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--bg);font-size:13px;}
.word-list-table th{color:var(--text-secondary);font-weight:500;background:var(--bg);}
.word-list-table tr:hover{background:var(--primary-light);}
.word-list-table .word-en{font-weight:600;font-family:'Helvetica Neue',Arial,sans-serif;}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--bg);margin-bottom:20px;}
.tab{padding:10px 20px;cursor:pointer;font-size:14px;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab:hover{color:var(--text-primary);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}
.search-box{position:relative;margin-bottom:20px;}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--white);}
.search-box input:focus{border-color:var(--primary);}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-placeholder);}
.flex{display:flex;}.flex-wrap{flex-wrap:wrap;}.gap-8{gap:8px;}.gap-12{gap:12px;}.gap-16{gap:16px;}.gap-20{gap:20px;}
.items-center{align-items:center;}.justify-between{justify-content:space-between;}.justify-center{justify-content:center;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mt-20{margin-top:20px;}.mt-24{margin-top:24px;}
.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}
.text-center{text-align:center;}.text-sm{font-size:13px;}.text-secondary{color:var(--text-secondary);}
.font-bold{font-weight:600;}.w-full{width:100%;}

<div id="app"></div>
<script>
var SYSTEM_LIBRARIES=[
{id:'cet4',name:'四级核心词汇',category:'四六级',difficulty:2,studyCount:23580,words:[
{english:'abandon',phonetic:'/əˈbændən/',meaning:'vt. 放弃；抛弃；遗弃',example:'He abandoned his research for lack of funds.'},
{english:'ability',phonetic:'/əˈbɪləti/',meaning:'n. 能力；才能',example:'She has the ability to solve complex problems.'},
{english:'abstract',phonetic:'/ˈæbstrækt/',meaning:'a. 抽象的 n. 摘要',example:'The concept is too abstract for young children.'},
{english:'academy',phonetic:'/əˈkædəmi/',meaning:'n. 学院；研究院',example:'He was admitted to the military academy.'},
{english:'access',phonetic:'/ˈækses/',meaning:'n. 通道；访问 vt. 存取',example:'Students have access to the library 24/7.'},
{english:'accommodate',phonetic:'/əˈkɒmədeɪt/',meaning:'vt. 容纳；提供住宿',example:'The hotel can accommodate up to 500 guests.'},
{english:'accomplish',phonetic:'/əˈkʌmplɪʃ/',meaning:'vt. 完成；实现',example:'She accomplished her goal ahead of schedule.'},

var EBBINGHAUS_INTERVALS=[0,1,2,4,7,15,30];

function getNextReviewDate(i){var d=EBBINGHAUS_INTERVALS[Math.min(i,EBBINGHAUS_INTERVALS.length-1)];var dt=new Date();dt.setDate(dt.getDate()+d);return dt.toISOString().split('T')[0];}
function getToday(){return new Date().toISOString().split('T')[0];}
function getDaysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}

function Store(){this.data=this._load();}
Store.prototype._load=function(){try{var r=localStorage.getItem('wordmaster_data');if(r)return JSON.parse(r);}catch(e){}return{users:[],currentUserId:null};};
Store.prototype._save=function(){localStorage.setItem('wordmaster_data',JSON.stringify(this.data));};
Store.prototype.register=function(email,password,nickname){
if(this.data.users.find(function(u){return u.email===email;}))return{ok:false,msg:'该邮箱已注册'};
var user={id:'u_'+Date.now(),email:email,password:password,nickname:nickname,avatar:nickname.charAt(0).toUpperCase(),goal:'',goalMonths:3,createdAt:getToday(),libraries:[],progress:{},records:[],plan:{libraryId:null,dailyNew:20,reminderEnabled:false,reminderTime:'08:00'}};
this.data.users.push(user);this.data.currentUserId=user.id;this._save();return{ok:true,user:user};
};
Store.prototype.login=function(email,password){
var user=this.data.users.find(function(u){return u.email===email&&u.password===password;});
if(!user)return{ok:false,msg:'邮箱或密码错误'};this.data.currentUserId=user.id;this._save();return{ok:true,user:user};
};
Store.prototype.logout=function(){this.data.currentUserId=null;this._save();};
Store.prototype.getCurrentUser=function(){if(!this.data.currentUserId)return null;return this.data.users.find(function(u){return u.id===this.data.currentUserId;}.bind(this))||null;};
Store.prototype.updateUser=function(updates){var u=this.getCurrentUser();if(!u)return;for(var k in updates)u[k]=updates[k];this._save();};
Store.prototype.getUserLibraries=function(){var u=this.getCurrentUser();return u?u.libraries:[];};
Store.prototype.addSystemLibrary=function(sysId){
var u=this.getCurrentUser();if(!u)return;
if(u.libraries.find(function(l){return l.sourceId===sysId;}))return;
var sys=SYSTEM_LIBRARIES.find(function(l){return l.id===sysId;});if(!sys)return;
u.libraries.push({id:'lib_'+Date.now(),name:sys.name,type:'system',sourceId:sys.id,category:sys.category,difficulty:sys.difficulty,words:JSON.parse(JSON.stringify(sys.words))});
this._save();
};
Store.prototype.addCustomLibrary=function(name,words){
var u=this.getCurrentUser();if(!u)return;
u.libraries.push({id:'lib_'+Date.now(),name:name,type:'custom',sourceId:null,category:'自定义',difficulty:0,words:words||[]});
this._save();
};
Store.prototype.removeLibrary=function(libId){var u=this.getCurrentUser();if(!u)return;u.libraries=u.libraries.filter(function(l){return l.id!==libId;});this._save();};
Store.prototype.addWordToLibrary=function(libId,word){var u=this.getCurrentUser();if(!u)return;var lib=u.libraries.find(function(l){return l.id===libId;});if(!lib)return;lib.words.push(word);this._save();};
Store.prototype.removeWordFromLibrary=function(libId,idx){var u=this.getCurrentUser();if(!u)return;var lib=u.libraries.find(function(l){return l.id===libId;});if(!lib)return;lib.words.splice(idx,1);this._save();};
Store.prototype.getLibrary=function(libId){var u=this.getCurrentUser();if(!u)return null;return u.libraries.find(function(l){return l.id===libId;})||null;};
Store.prototype.getWordProgress=function(libId,w){var u=this.getCurrentUser();if(!u)return null;return u.progress[libId+'::'+w]||null;};
Store.prototype.updateWordProgress=function(libId,wordEnglish,action){
var u=this.getCurrentUser();if(!u)return;var key=libId+'::'+wordEnglish;
var prog=u.progress[key]||{status:'new',interval:0,nextReview:getToday(),reviewCount:0,correctCount:0,lastReview:null};
prog.reviewCount++;prog.lastReview=getToday();
if(action==='know'){prog.correctCount++;prog.interval=Math.min(prog.interval+1,EBBINGHAUS_INTERVALS.length-1);prog.nextReview=getNextReviewDate(prog.interval);prog.status=prog.interval>=EBBINGHAUS_INTERVALS.length-1?'mastered':'learning';}
else if(action==='unknown'){prog.interval=0;prog.nextReview=getToday();prog.status='learning';}
else if(action==='fuzzy'){prog.nextReview=getToday();prog.status='learning';}
u.progress[key]=prog;this._save();
};
Store.prototype.getLibraryStats=function(libId){
var u=this.getCurrentUser();if(!u)return{total:0,mastered:0,learning:0,new_w:0};
var lib=u.libraries.find(function(l){return l.id===libId;});if(!lib)return{total:0,mastered:0,learning:0,new_w:0};
var m=0,l=0,n=0;var self=this;
lib.words.forEach(function(w){var p=u.progress[libId+'::'+w.english];if(!p||p.status==='new')n++;else if(p.status==='mastered')m++;else l++;});
return{total:lib.words.length,mastered:m,learning:l,new_w:n};
};
Store.prototype.getTodayWords=function(libId,dailyNew){
var u=this.getCurrentUser();if(!u)return{review:[],newWords:[]};
var lib=u.libraries.find(function(l){return l.id===libId;});if(!lib)return{review:[],newWords:[]};
var today=getToday(),review=[],newWords=[];
lib.words.forEach(function(w){var p=u.progress[libId+'::'+w.english];
if(!p||p.status==='new')newWords.push(w);
else if(p.nextReview<=today)review.push(w);
});
return{review:review,newWords:newWords.slice(0,dailyNew||20)};
};
Store.prototype.addRecord=function(record){
var u=this.getCurrentUser();if(!u)return;var today=getToday();
var existing=u.records.find(function(r){return r.date===today;});

var SimpleChart={};
SimpleChart.barChart=function(canvas,labels,data,color){
color=color||'#409EFF';var ctx=canvas.getContext('2d');var W=canvas.width=canvas.parentElement.clientWidth;var H=canvas.height=canvas.parentElement.clientHeight||240;ctx.clearRect(0,0,W,H);
var p={top:20,right:20,bottom:40,left:50};var cW=W-p.left-p.right;var cH=H-p.top-p.bottom;var maxV=Math.max.apply(null,data.concat([1]));var barW=Math.min(cW/labels.length*0.6,40);var gap=cW/labels.length;
ctx.strokeStyle='#E4E7ED';ctx.lineWidth=0.5;
for(var i=0;i<=4;i++){var y=p.top+cH*(1-i/4);ctx.beginPath();ctx.moveTo(p.left,y);ctx.lineTo(W-p.right,y);ctx.stroke();ctx.fillStyle='#909399';ctx.font='11px Arial';ctx.textAlign='right';ctx.fillText(Math.round(maxV*i/4),p.left-8,y+4);}
for(var i=0;i<labels.length;i++){var x=p.left+gap*i+gap/2-barW/2;var bH=(data[i]/maxV)*cH;var y=p.top+cH-bH;ctx.fillStyle=color;ctx.fillRect(x,y,barW,bH);
if(data[i]>0){ctx.fillStyle='#303133';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText(data[i],p.left+gap*i+gap/2,y-6);}
ctx.fillStyle='#909399';ctx.font='11px Arial';ctx.textAlign='center';ctx.fillText(labels[i],p.left+gap*i+gap/2,H-p.bottom+18);}
};
SimpleChart.lineChart=function(canvas,labels,datasets){
var ctx=canvas.getContext('2d');var W=canvas.width=canvas.parentElement.clientWidth;var H=canvas.height=canvas.parentElement.clientHeight||240;ctx.clearRect(0,0,W,H);
var p={top:20,right:20,bottom:40,left:50};var cW=W-p.left-p.right;var cH=H-p.top-p.bottom;var all=[];datasets.forEach(function(d){all=all.concat(d.data);});var maxV=Math.max.apply(null,all.concat([1]));var gap=cW/Math.max(labels.length-1,1);
ctx.strokeStyle='#E4E7ED';ctx.lineWidth=0.5;
for(var i=0;i<=4;i++){var y=p.top+cH*(1-i/4);ctx.beginPath();ctx.moveTo(p.left,y);ctx.lineTo(W-p.right,y);ctx.stroke();ctx.fillStyle='#909399';ctx.font='11px Arial';ctx.textAlign='right';ctx.fillText(Math.round(maxV*i/4),p.left-8,y+4);}
for(var i=0;i<labels.length;i++){ctx.fillStyle='#909399';ctx.font='11px Arial';ctx.textAlign='center';ctx.fillText(labels[i],p.left+gap*i,H-p.bottom+18);}
datasets.forEach(function(ds){ctx.beginPath();ctx.strokeStyle=ds.color;ctx.lineWidth=2.5;ctx.lineJoin='round';
ds.data.forEach(function(val,i){var x=p.left+gap*i;var y=p.top+cH*(1-val/maxV);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();
ds.data.forEach(function(val,i){var x=p.left+gap*i;var y=p.top+cH*(1-val/maxV);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle=ds.color;ctx.lineWidth=2;ctx.stroke();});});
};
SimpleChart.donutChart=function(canvas,data,colors){
var ctx=canvas.getContext('2d');var size=Math.min(canvas.parentElement.clientWidth,200);canvas.width=size;canvas.height=size;ctx.clearRect(0,0,size,size);
var cx=size/2,cy=size/2,r=size/2-10,innerR=r*0.6;var total=0;data.forEach(function(v){total+=v;});if(total===0)total=1;var start=-Math.PI/2;
data.forEach(function(val,i){var angle=(val/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,r,start,start+angle);ctx.arc(cx,cy,innerR,start+angle,start,true);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();start+=angle;});
ctx.fillStyle='#303133';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText(total,cx,cy+2);ctx.fillStyle='#909399';ctx.font='11px Arial';ctx.fillText('总单词数',cx,cy+18);
};

App.prototype.startStudy=function(libId){
var lib=this.store.getLibrary(libId);if(!lib)return showToast('词库不存在','error');
var user=this.store.getCurrentUser();var todayWords=this.store.getTodayWords(libId,user.plan.dailyNew);var allWords=todayWords.review.concat(todayWords.newWords);
if(allWords.length===0){showToast('今日学习已完成！🎉','success');return;}
this.studyState={libId:libId,libName:lib.name,words:allWords,reviewCount:todayWords.review.length,newCount:todayWords.newWords.length,currentIndex:0,revealed:false,mode:'en2cn',sessionStats:{know:0,fuzzy:0,unknown:0},completed:false};
this.currentPage='study';this.renderStudy();
};

App.prototype.renderStudy=function(){

var s=this.studyState;var self=this;var main=document.getElementById('main-content');main.className='main-content study-page';

if(s.completed){

main.innerHTML='<div class="study-header"><div class="back-btn" id="study-back">← 返回</div><div class="study-title">'+s.libName+'</div><div></div></div><div class="study-body"><div class="study-complete"><div class="complete-icon">🎉</div><h2>今日学习完成！</h2><p>太棒了，继续保持学习的热情！</p><div class="complete-stats"><div class="complete-stat"><h4>'+s.sessionStats.know+'</h4><p>✅ 认识</p></div><div class="complete-stat"><h4>'+s.sessionStats.fuzzy+'</h4><p>🤔 模糊</p></div><div class="complete-stat"><h4>'+s.sessionStats.unknown+'</h4><p>❌ 不认识</p></div><div class="complete-stat"><h4>'+accuracy+'%</h4><p>📊 正确率</p></div></div><div class="flex gap-12 justify-center"><button class="btn btn-primary btn-lg" id="back-dashboard">返回学习中心</button><button class="btn btn-outline btn-lg" id="study-again">再来一轮</button></div></div></div>';
if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);

document.getElementById('study-back').addEventListener('click',backFn);

var word=s.words[s.currentIndex];var isReview=s.currentIndex<s.reviewCount;var total=s.words.length;var current=s.currentIndex+1;
var cardContent='';

cardContent='<div class="word-english">'+word.english+'</div><div class="word-phonetic">'+(word.phonetic||'')+'</div><button class="word-speak" onclick="speak(\''+word.english+'\')">🔊</button>';
if(s.revealed)cardContent+='<div class="word-meaning">'+word.meaning+'</div>'+(word.example?'<div class="word-example">"'+word.example+'"</div>':'');
else cardContent+='<div style="color:var(--text-placeholder);font-size:16px;margin-top:16px">点击下方按钮显示释义</div><div style="font-size:12px;color:var(--text-placeholder);margin-top:8px">快捷键：空格键</div>';
}else{
cardContent='<div class="word-meaning" style="font-size:24px;margin-bottom:16px">'+word.meaning+'</div>';
if(word.example)cardContent+='<div class="word-example" style="margin-bottom:20px">"'+word.example.replace(new RegExp(word.english,'gi'),'____')+'"</div>';
if(s.revealed)cardContent+='<div class="word-english" style="color:var(--success);margin-top:12px">'+word.english+'</div><div class="word-phonetic">'+(word.phonetic||'')+'</div><button class="word-speak" onclick="speak(\''+word.english+'\')" style="margin-top:8px">🔊</button>';
else cardContent+='<div class="word-answer-area"><input type="text" id="spell-input" placeholder="请输入英文单词..." autocomplete="off" autocapitalize="off"></div><div style="font-size:12px;color:var(--text-placeholder);margin-top:8px">输入后按回车检查</div>';
}

var footerContent='';
if(s.revealed)footerContent='<button class="action-btn btn-unknown" data-action="unknown">❌ 不认识</button><button class="action-btn btn-fuzzy" data-action="fuzzy">🤔 模糊</button><button class="action-btn btn-know" data-action="know">✅ 认识</button>';
else if(s.mode==='cn2en')footerContent='<button class="action-btn" id="check-spell" style="background:var(--primary);color:#fff;border:2px solid var(--primary)">检查拼写</button>';

document.getElementById('study-back').addEventListener('click',function(){self.studyState=null;self.currentPage='dashboard';var navs=document.querySelectorAll('.nav-item');for(var i=0;i<navs.length;i++)navs[i].classList.remove('active');var dn=document.querySelector('[data-page="dashboard"]');if(dn)dn.classList.add('active');self.renderDashboard();});

var modeBtns=document.querySelectorAll('.mode-switch button');for(var i=0;i<modeBtns.length;i++){(function(b){b.addEventListener('click',function(){s.mode=b.getAttribute('data-mode');s.revealed=false;self.renderStudy();});})(modeBtns[i]);}

var checkBtn=document.getElementById('check-spell');if(checkBtn)checkBtn.addEventListener('click',function(){var input=document.getElementById('spell-input');if(!input)return;var answer=input.value.trim().toLowerCase();var correct=word.english.toLowerCase();if(answer===correct)input.className+=' correct';else input.className+=' wrong';s.revealed=true;setTimeout(function(){self.renderStudy();},400);});

var spellInput=document.getElementById('spell-input');if(spellInput){spellInput.focus();spellInput.addEventListener('keypress',function(e){if(e.key==='Enter'){var cb=document.getElementById('check-spell');if(cb)cb.click();}});}

var action=btn.getAttribute('data-action');s.sessionStats[action]++;
self.store.updateWordProgress(s.libId,word.english,action);
if(action==='unknown')s.words.push(word);
var isNew=s.currentIndex>=s.reviewCount;
self.store.addRecord({newCount:isNew?1:0,reviewCount:isNew?0:1,correctCount:action==='know'?1:0,totalCount:1});
s.currentIndex++;s.revealed=false;
if(s.currentIndex>=s.words.length)s.completed=true;
self.renderStudy();
});})(actionBtns[i]);}

if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);

if(!s.revealed){if(e.key===' '||e.key==='Enter'){e.preventDefault();if(s.mode==='cn2en'){var cb=document.getElementById('check-spell');if(cb)cb.click();}else{s.revealed=true;self.renderStudy();}}}
else{if(e.key==='1'){var b=document.querySelector('[data-action="unknown"]');if(b)b.click();}if(e.key==='2'){var b=document.querySelector('[data-action="fuzzy"]');if(b)b.click();}if(e.key==='3'){var b=document.querySelector('[data-action="know"]');if(b)b.click();}}};
self._studyKeyHandler=keyHandler;document.addEventListener('keydown',keyHandler);
};

document.getElementById('reminder-toggle').addEventListener('click',function(e){reminderEnabled=!reminderEnabled;e.target.classList.toggle('active',reminderEnabled);});

document.getElementById('save-plan').addEventListener('click',function(){var libId=document.getElementById('set-plan-lib').value;self.store.updateUser({plan:{libraryId:libId||null,dailyNew:dailyNew,reminderEnabled:reminderEnabled,reminderTime:plan.reminderTime}});showToast('学习计划已保存','success');});

document.getElementById('save-password').addEventListener('click',function(){var p1=document.getElementById('set-newpass').value;var p2=document.getElementById('set-newpass2').value;if(!p1)return showToast('请输入新密码','error');if(p1.length<6)return showToast('密码至少6位','error');if(p1!==p2)return showToast('两次密码不一致','error');self.store.updateUser({password:p1});showToast('密码已修改','success');});

document.getElementById('logout-btn').addEventListener('click',function(){self.store.logout();if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);self.studyState=null;self.renderAuth();showToast('已退出登录','info');});

document.getElementById('clear-data').addEventListener('click',function(){if(confirm('确定要清除所有学习数据吗？此操作不可撤销！')){var u=self.store.getCurrentUser();u.progress={};u.records=[];self.store._save();showToast('学习数据已清除','info');self.renderSettings();}});
};

var app=new App();
window.addEventListener('resize',function(){if(app.currentPage==='dashboard'||app.currentPage==='stats'){clearTimeout(window._resizeTimer);window._resizeTimer=setTimeout(function(){app.renderPage();},300);}});
</script>
</body>
</html>
