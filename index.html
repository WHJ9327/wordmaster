var EBBINGHAUS_INTERVALS=[0,1,2,4,7,15,30];

function getToday(){return new Date().toISOString().split('T')[0];}
function getDaysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}
function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.85;speechSynthesis.speak(u);}

function transErr(m){if(!m)return'未知错误';if(m.indexOf('already registered')!==-1)return'该邮箱已注册';if(m.indexOf('Invalid login')!==-1)return'邮箱或密码错误';if(m.indexOf('Email not confirmed')!==-1)return'邮箱或密码错误';if(m.indexOf('least 6')!==-1)return'密码至少6位';return m;}

SC.bar=function(cv,lb,dt,co){co=co||'#409EFF';var c=cv.getContext('2d');var W=cv.width=cv.parentElement.clientWidth;var H=cv.height=cv.parentElement.clientHeight||240;c.clearRect(0,0,W,H);var p={t:20,r:20,b:40,l:50};var cW=W-p.l-p.r;var cH=H-p.t-p.b;var mx=Math.max.apply(null,dt.concat([1]));var bW=Math.min(cW/lb.length*0.6,40);var g=cW/lb.length;c.strokeStyle='#E4E7ED';c.lineWidth=0.5;for(var i=0;i<=4;i++){var y=p.t+cH*(1-i/4);c.beginPath();c.moveTo(p.l,y);c.lineTo(W-p.r,y);c.stroke();c.fillStyle='#909399';c.font='11px Arial';c.textAlign='right';c.fillText(Math.round(mx*i/4),p.l-8,y+4);}for(var i=0;i<lb.length;i++){var x=p.l+g*i+g/2-bW/2;var bH=(dt[i]/mx)*cH;var y=p.t+cH-bH;c.fillStyle=co;c.fillRect(x,y,bW,bH);if(dt[i]>0){c.fillStyle='#303133';c.font='bold 11px Arial';c.textAlign='center';c.fillText(dt[i],p.l+g*i+g/2,y-6);}c.fillStyle='#909399';c.font='11px Arial';c.textAlign='center';c.fillText(lb[i],p.l+g*i+g/2,H-p.b+18);}};
SC.line=function(cv,lb,ds){var c=cv.getContext('2d');var W=cv.width=cv.parentElement.clientWidth;var H=cv.height=cv.parentElement.clientHeight||240;c.clearRect(0,0,W,H);var p={t:20,r:20,b:40,l:50};var cW=W-p.l-p.r;var cH=H-p.t-p.b;var al=[];ds.forEach(function(d){al=al.concat(d.data);});var mx=Math.max.apply(null,al.concat([1]));var g=cW/Math.max(lb.length-1,1);c.strokeStyle='#E4E7ED';c.lineWidth=0.5;for(var i=0;i<=4;i++){var y=p.t+cH*(1-i/4);c.beginPath();c.moveTo(p.l,y);c.lineTo(W-p.r,y);c.stroke();c.fillStyle='#909399';c.font='11px Arial';c.textAlign='right';c.fillText(Math.round(mx*i/4),p.l-8,y+4);}for(var i=0;i<lb.length;i++){c.fillStyle='#909399';c.font='11px Arial';c.textAlign='center';c.fillText(lb[i],p.l+g*i,H-p.b+18);}ds.forEach(function(d){c.beginPath();c.strokeStyle=d.color;c.lineWidth=2.5;c.lineJoin='round';d.data.forEach(function(v,i){var x=p.l+g*i;var y=p.t+cH*(1-v/mx);if(i===0)c.moveTo(x,y);else c.lineTo(x,y);});c.stroke();d.data.forEach(function(v,i){var x=p.l+g*i;var y=p.t+cH*(1-v/mx);c.beginPath();c.arc(x,y,4,0,Math.PI*2);c.fillStyle='#fff';c.fill();c.strokeStyle=d.color;c.lineWidth=2;c.stroke();});});};
SC.donut=function(cv,dt,co){var c=cv.getContext('2d');var sz=Math.min(cv.parentElement.clientWidth,200);cv.width=sz;cv.height=sz;c.clearRect(0,0,sz,sz);var cx=sz/2,cy=sz/2,r=sz/2-10,ir=r*0.6;var tot=0;dt.forEach(function(v){tot+=v;});if(tot===0)tot=1;var st=-Math.PI/2;dt.forEach(function(v,i){var a=(v/tot)*Math.PI*2;c.beginPath();c.arc(cx,cy,r,st,st+a);c.arc(cx,cy,ir,st+a,st,true);c.closePath();c.fillStyle=co[i];c.fill();st+=a;});c.fillStyle='#303133';c.font='bold 22px Arial';c.textAlign='center';c.fillText(tot,cx,cy+2);c.fillStyle='#909399';c.font='11px Arial';c.fillText('总单词数',cx,cy+18);};

// CLOUD STORE - Supabase Backend
// ============================================================
function CloudStore(){
  this.db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  this.authUser=null;
  this.profile=null;
  this.libraries=[];
  this.progress={};
  this.records=[];
}
CloudStore.prototype.checkSession=async function(){
  var r=await this.db.auth.getSession();
  if(r.data.session){this.authUser=r.data.session.user;return true;}return false;
};
CloudStore.prototype.register=async function(email,pw,nickname){
  var r=await this.db.auth.signUp({email:email,password:pw});
  if(r.error)return{ok:false,msg:transErr(r.error.message)};
  this.authUser=r.data.user;
  var pr={id:this.authUser.id,email:email,nickname:nickname,avatar:nickname.charAt(0).toUpperCase(),goal:'',goal_months:3,plan:{libraryId:null,dailyNew:20,reminderEnabled:false,reminderTime:'08:00'}};
  var ir=await this.db.from('profiles').insert(pr);
  if(ir.error)return{ok:false,msg:ir.error.message};
  return{ok:true};
};
CloudStore.prototype.login=async function(email,pw){
  var r=await this.db.auth.signInWithPassword({email:email,password:pw});
  if(r.error)return{ok:false,msg:transErr(r.error.message)};
  this.authUser=r.data.user;return{ok:true};
};
CloudStore.prototype.logout=async function(){
  await this.db.auth.signOut();this.authUser=null;this.profile=null;this.libraries=[];this.progress={};this.records=[];
};
CloudStore.prototype.loadAllData=async function(){
  var uid=this.authUser.id;
  var pr=await this.db.from('profiles').select('*').eq('id',uid).single();
  if(pr.data){var p=pr.data;this.profile={id:p.id,email:p.email,nickname:p.nickname,avatar:p.avatar||p.nickname.charAt(0).toUpperCase(),goal:p.goal||'',goalMonths:p.goal_months||3,plan:p.plan||{libraryId:null,dailyNew:20,reminderEnabled:false,reminderTime:'08:00'}};}
  var lr=await this.db.from('user_libraries').select('*').eq('user_id',uid);
  this.libraries=(lr.data||[]).map(function(l){return{id:l.id,name:l.name,type:l.type,sourceId:l.source_id,category:l.category||'',difficulty:l.difficulty||0,words:l.words||[]};});
  var pgr=await this.db.from('word_progress').select('*').eq('user_id',uid);
  this.progress={};var self=this;(pgr.data||[]).forEach(function(p){var k=p.library_id+'::'+p.word_english;self.progress[k]={status:p.status||'new',interval:p.interval_level||0,nextReview:p.next_review||getToday(),reviewCount:p.review_count||0,correctCount:p.correct_count||0,lastReview:p.last_review||null};});
  var rr=await this.db.from('study_records').select('*').eq('user_id',uid);
  this.records=(rr.data||[]).map(function(r){return{date:r.record_date,newCount:r.new_count||0,reviewCount:r.review_count||0,correctCount:r.correct_count||0,totalCount:r.total_count||0};});
};
CloudStore.prototype.getCurrentUser=function(){return this.profile;};
CloudStore.prototype.getUserLibraries=function(){return this.libraries;};
CloudStore.prototype.getLibrary=function(id){return this.libraries.find(function(l){return l.id===id;})||null;};
CloudStore.prototype.updateUser=function(updates){
  if(!this.profile)return;for(var k in updates)this.profile[k]=updates[k];
  var d={};if(updates.nickname!==undefined)d.nickname=updates.nickname;if(updates.avatar!==undefined)d.avatar=updates.avatar;
  if(updates.goal!==undefined)d.goal=updates.goal;if(updates.goalMonths!==undefined)d.goal_months=updates.goalMonths;
  if(updates.plan!==undefined)d.plan=updates.plan;
  if(Object.keys(d).length>0)this.db.from('profiles').update(d).eq('id',this.authUser.id).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.addSystemLibrary=function(sysId){
  if(this.libraries.find(function(l){return l.sourceId===sysId;}))return;
  var sys=SYSTEM_LIBRARIES.find(function(l){return l.id===sysId;});if(!sys)return;
  var lib={id:'lib_'+Date.now(),name:sys.name,type:'system',sourceId:sys.id,category:sys.category,difficulty:sys.difficulty,words:JSON.parse(JSON.stringify(sys.words))};
  this.libraries.push(lib);
  this.db.from('user_libraries').insert({id:lib.id,user_id:this.authUser.id,name:lib.name,type:lib.type,source_id:lib.sourceId,category:lib.category,difficulty:lib.difficulty,words:lib.words}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.addCustomLibrary=function(name,words){
  var lib={id:'lib_'+Date.now(),name:name,type:'custom',sourceId:null,category:'自定义',difficulty:0,words:words||[]};
  this.libraries.push(lib);
  this.db.from('user_libraries').insert({id:lib.id,user_id:this.authUser.id,name:lib.name,type:lib.type,source_id:null,category:lib.category,difficulty:0,words:lib.words}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.removeLibrary=function(libId){
  this.libraries=this.libraries.filter(function(l){return l.id!==libId;});
  this.db.from('user_libraries').delete().eq('id',libId).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.addWordToLibrary=function(libId,word){
  var lib=this.getLibrary(libId);if(!lib)return;lib.words.push(word);
  this.db.from('user_libraries').update({words:lib.words}).eq('id',libId).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.removeWordFromLibrary=function(libId,idx){
  var lib=this.getLibrary(libId);if(!lib)return;lib.words.splice(idx,1);
  this.db.from('user_libraries').update({words:lib.words}).eq('id',libId).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.getWordProgress=function(libId,w){return this.progress[libId+'::'+w]||null;};
CloudStore.prototype.updateWordProgress=function(libId,wordEn,action){
  var key=libId+'::'+wordEn;
  var prog=this.progress[key]||{status:'new',interval:0,nextReview:getToday(),reviewCount:0,correctCount:0,lastReview:null};
  prog.reviewCount++;prog.lastReview=getToday();
  if(action==='know'){prog.correctCount++;prog.interval=Math.min(prog.interval+1,EBBINGHAUS_INTERVALS.length-1);prog.nextReview=getNextReviewDate(prog.interval);prog.status=prog.interval>=EBBINGHAUS_INTERVALS.length-1?'mastered':'learning';}
  else if(action==='unknown'){prog.interval=0;prog.nextReview=getToday();prog.status='learning';}
  else{prog.nextReview=getToday();prog.status='learning';}
  this.progress[key]=prog;
  this.db.from('word_progress').upsert({user_id:this.authUser.id,library_id:libId,word_english:wordEn,status:prog.status,interval_level:prog.interval,next_review:prog.nextReview,review_count:prog.reviewCount,correct_count:prog.correctCount,last_review:prog.lastReview},{onConflict:'user_id,library_id,word_english'}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.getLibraryStats=function(libId){
  var lib=this.getLibrary(libId);if(!lib)return{total:0,mastered:0,learning:0,new_w:0};
  var m=0,l=0,n=0;var self=this;lib.words.forEach(function(w){var p=self.progress[libId+'::'+w.english];if(!p||p.status==='new')n++;else if(p.status==='mastered')m++;else l++;});
  return{total:lib.words.length,mastered:m,learning:l,new_w:n};
};
CloudStore.prototype.getTodayWords=function(libId,dailyNew){
  var lib=this.getLibrary(libId);if(!lib)return{review:[],newWords:[]};
  var today=getToday(),review=[],newWords=[];var self=this;
  lib.words.forEach(function(w){var p=self.progress[libId+'::'+w.english];if(!p||p.status==='new')newWords.push(w);else if(p.nextReview<=today)review.push(w);});
  return{review:review,newWords:newWords.slice(0,dailyNew||20)};
};
CloudStore.prototype.addRecord=function(rec){
  var today=getToday();var existing=this.records.find(function(r){return r.date===today;});
  if(existing){existing.newCount+=(rec.newCount||0);existing.reviewCount+=(rec.reviewCount||0);existing.correctCount+=(rec.correctCount||0);existing.totalCount+=(rec.totalCount||0);}
  else{var nr={date:today,newCount:rec.newCount||0,reviewCount:rec.reviewCount||0,correctCount:rec.correctCount||0,totalCount:rec.totalCount||0};this.records.push(nr);existing=nr;}
  this.db.from('study_records').upsert({user_id:this.authUser.id,record_date:today,new_count:existing.newCount,review_count:existing.reviewCount,correct_count:existing.correctCount,total_count:existing.totalCount},{onConflict:'user_id,record_date'}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.getRecords=function(days){var since=getDaysAgo(days);return this.records.filter(function(r){return r.date>=since;}).sort(function(a,b){return a.date.localeCompare(b.date);});};
CloudStore.prototype.getTodayRecord=function(){return this.records.find(function(r){return r.date===getToday();})||{date:getToday(),newCount:0,reviewCount:0,correctCount:0,totalCount:0};};
CloudStore.prototype.getTotalStats=function(){var tw=0;for(var k in this.progress)if(this.progress[k].status!=='new')tw++;var td=[];this.records.forEach(function(r){if(td.indexOf(r.date)===-1)td.push(r.date);});var tr=0;this.records.forEach(function(r){tr+=(r.totalCount||0);});return{totalWords:tw,totalDays:td.length,totalReviews:tr};};
CloudStore.prototype.changePassword=async function(np){var r=await this.db.auth.updateUser({password:np});if(r.error)return{ok:false,msg:r.error.message};return{ok:true};};

  }};

App.prototype._parseWords=function(raw){if(!raw)return[];return raw.split('\n').filter(function(l){return l.trim();}).map(function(l){var p=l.split('|').map(function(s){return s.trim();});return{english:p[0]||'',phonetic:p[1]||'',meaning:p[2]||'',example:p[3]||''};}).filter(function(w){return w.english;});};

App.prototype.showLibDetail=function(libId){
  var lib=this.store.getLibrary(libId);if(!lib)return;var self=this;
  var ov=document.createElement('div');ov.className='modal-overlay';
  var rows='';for(var i=0;i<lib.words.length;i++){var w=lib.words[i];var p=self.store.getWordProgress(libId,w.english);var st=p?p.status:'new';var sl=st==='mastered'?'<span class="tag tag-green">已掌握</span>':st==='learning'?'<span class="tag tag-yellow">学习中</span>':'<span class="tag tag-blue">未学</span>';rows+='<tr><td class="word-en">'+w.english+'</td><td style="font-size:12px;color:var(--text-secondary)">'+w.phonetic+'</td><td>'+w.meaning+'</td><td>'+sl+'</td>'+(lib.type==='custom'?'<td><button class="btn btn-outline btn-sm dwb" data-idx="'+i+'" style="color:var(--danger);border-color:var(--danger);padding:2px 8px;font-size:11px">删除</button></td>':'')+'</tr>';}
  ov.innerHTML='<div class="modal" style="width:700px;max-height:80vh"><div class="flex justify-between items-center mb-16"><h2>📖 '+lib.name+'</h2><button class="btn btn-outline btn-sm cm">✕ 关闭</button></div><div style="max-height:50vh;overflow-y:auto"><table class="word-list-table"><thead><tr><th>单词</th><th>音标</th><th>释义</th><th>状态</th>'+(lib.type==='custom'?'<th>操作</th>':'')+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+(lib.type==='custom'?'<div class="mt-16 flex gap-8"><input type="text" id="awi" placeholder="英文 | 音标 | 释义 | 例句" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px"><button class="btn btn-primary btn-sm" id="awb">添加</button></div>':'')+'<div class="mt-12"><button class="btn btn-outline btn-sm" id="elb">📤 导出</button></div></div>';
  document.body.appendChild(ov);ov.querySelector('.cm').addEventListener('click',function(){ov.remove();});ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  var dbs=ov.querySelectorAll('.dwb');for(var i=0;i<dbs.length;i++){(function(b){b.addEventListener('click',function(){if(confirm('删除？')){self.store.removeWordFromLibrary(libId,parseInt(b.getAttribute('data-idx')));ov.remove();self.showLibDetail(libId);showToast('已删除','info');}});})(dbs[i]);}
  var awb=ov.querySelector('#awb');if(awb)awb.addEventListener('click',function(){var inp=ov.querySelector('#awi');var ws=self._parseWords(inp.value);if(!ws.length)return showToast('请输入单词','error');ws.forEach(function(w){self.store.addWordToLibrary(libId,w);});ov.remove();self.showLibDetail(libId);showToast('添加'+ws.length+'词','success');});
  var elb=ov.querySelector('#elb');if(elb)elb.addEventListener('click',function(){var lines=lib.words.map(function(w){return w.english+' | '+w.phonetic+' | '+w.meaning+' | '+w.example;});var blob=new Blob([lines.join('\n')],{type:'text/plain'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=lib.name+'.txt';a.click();URL.revokeObjectURL(url);showToast('已导出','success');});
};

App.prototype.startStudy=function(libId){
  var lib=this.store.getLibrary(libId);if(!lib)return showToast('词库不存在','error');
  var user=this.store.getCurrentUser();var tw=this.store.getTodayWords(libId,user.plan.dailyNew);var all=tw.review.concat(tw.newWords);
  if(!all.length){showToast('今日已完成！🎉','success');return;}
  this.studyState={libId:libId,libName:lib.name,words:all,reviewCount:tw.review.length,newCount:tw.newWords.length,currentIndex:0,revealed:false,mode:'en2cn',sessionStats:{know:0,fuzzy:0,unknown:0},completed:false};
  this.currentPage='study';this.renderStudy();
};

App.prototype.renderStudy=function(){
  if(!this.studyState){this.currentPage='dashboard';this.renderDashboard();return;}
  var s=this.studyState;var self=this;var main=document.getElementById('main-content');main.className='main-content study-page';
  var goBack=function(){self.studyState=null;self.currentPage='dashboard';var ns=document.querySelectorAll('.nav-item');for(var i=0;i<ns.length;i++)ns[i].classList.remove('active');var dn=document.querySelector('[data-page="dashboard"]');if(dn)dn.classList.add('active');self.renderDashboard();};

  if(s.completed){var tot=s.sessionStats.know+s.sessionStats.fuzzy+s.sessionStats.unknown;var acc=tot>0?Math.round(s.sessionStats.know/tot*100):0;
  main.innerHTML='<div class="study-header"><div class="back-btn" id="sb">← 返回</div><div class="study-title">'+s.libName+'</div><div></div></div><div class="study-body"><div class="study-complete"><div class="complete-icon">🎉</div><h2>今日学习完成！</h2><p>太棒了，继续保持！</p><div class="complete-stats"><div class="complete-stat"><h4>'+s.sessionStats.know+'</h4><p>✅ 认识</p></div><div class="complete-stat"><h4>'+s.sessionStats.fuzzy+'</h4><p>🤔 模糊</p></div><div class="complete-stat"><h4>'+s.sessionStats.unknown+'</h4><p>❌ 不认识</p></div><div class="complete-stat"><h4>'+acc+'%</h4><p>📊 正确率</p></div></div><div class="flex gap-12 justify-center"><button class="btn btn-primary btn-lg" id="bd">返回学习中心</button><button class="btn btn-outline btn-lg" id="sa">再来一轮</button></div></div></div>';
  if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);
  document.getElementById('sb').addEventListener('click',goBack);document.getElementById('bd').addEventListener('click',goBack);
  document.getElementById('sa').addEventListener('click',function(){self.studyState=null;self.startStudy(s.libId);});return;}

  var word=s.words[s.currentIndex];var isR=s.currentIndex<s.reviewCount;var cc='';
  if(s.mode==='en2cn'){cc='<div class="word-english">'+word.english+'</div><div class="word-phonetic">'+(word.phonetic||'')+'</div><button class="word-speak" onclick="speak(\''+word.english+'\')">🔊</button>';if(s.revealed)cc+='<div class="word-meaning">'+word.meaning+'</div>'+(word.example?'<div class="word-example">"'+word.example+'"</div>':'');else cc+='<div style="color:var(--text-placeholder);font-size:16px;margin-top:16px">点击下方按钮显示释义</div>';}
  else{cc='<div class="word-meaning" style="font-size:24px;margin-bottom:16px">'+word.meaning+'</div>';if(s.revealed)cc+='<div class="word-english" style="color:var(--success);margin-top:12px">'+word.english+'</div><div class="word-phonetic">'+(word.phonetic||'')+'</div><button class="word-speak" onclick="speak(\''+word.english+'\')" style="margin-top:8px">🔊</button>';else cc+='<div class="word-answer-area"><input type="text" id="si" placeholder="输入英文单词..." autocomplete="off"></div>';}

  var fc='';if(s.revealed)fc='<button class="action-btn btn-unknown" data-action="unknown">❌ 不认识</button><button class="action-btn btn-fuzzy" data-action="fuzzy">🤔 模糊</button><button class="action-btn btn-know" data-action="know">✅ 认识</button>';
  else if(s.mode==='cn2en')fc='<button class="action-btn" id="cs" style="background:var(--primary);color:#fff;border:2px solid var(--primary)">检查拼写</button>';
  else fc='<button class="action-btn" id="rb" style="background:var(--primary);color:#fff;border:2px solid var(--primary);min-width:200px">显示释义</button>';

  main.innerHTML='<div class="study-header"><div class="back-btn" id="sb">← 返回</div><div class="flex items-center gap-12"><div class="study-title">'+s.libName+'</div><span class="tag '+(isR?'tag-yellow':'tag-blue')+'">'+(isR?'复习':'新词')+'</span></div><div class="study-progress"><div class="mode-switch"><button class="'+(s.mode==='en2cn'?'active':'')+'" data-mode="en2cn">英→中</button><button class="'+(s.mode==='cn2en'?'active':'')+'" data-mode="cn2en">中→英</button></div><span>'+(s.currentIndex+1)+'/'+s.words.length+'</span></div></div><div class="study-body"><div class="word-card">'+cc+'</div></div><div class="study-footer">'+fc+'</div>';

  document.getElementById('sb').addEventListener('click',goBack);
  var mbs=document.querySelectorAll('.mode-switch button');for(var i=0;i<mbs.length;i++){(function(b){b.addEventListener('click',function(){s.mode=b.getAttribute('data-mode');s.revealed=false;self.renderStudy();});})(mbs[i]);}
  var rb=document.getElementById('rb');if(rb)rb.addEventListener('click',function(){s.revealed=true;self.renderStudy();});
  var cs=document.getElementById('cs');if(cs)cs.addEventListener('click',function(){var inp=document.getElementById('si');if(!inp)return;if(inp.value.trim().toLowerCase()===word.english.toLowerCase())inp.className+=' correct';else inp.className+=' wrong';s.revealed=true;setTimeout(function(){self.renderStudy();},400);});
  var si=document.getElementById('si');if(si){si.focus();si.addEventListener('keypress',function(e){if(e.key==='Enter'){var cb=document.getElementById('cs');if(cb)cb.click();}});}
  var abs=document.querySelectorAll('[data-action]');for(var i=0;i<abs.length;i++){(function(b){b.addEventListener('click',function(){var a=b.getAttribute('data-action');s.sessionStats[a]++;self.store.updateWordProgress(s.libId,word.english,a);if(a==='unknown')s.words.push(word);self.store.addRecord({newCount:s.currentIndex>=s.reviewCount?1:0,reviewCount:s.currentIndex<s.reviewCount?1:0,correctCount:a==='know'?1:0,totalCount:1});s.currentIndex++;s.revealed=false;if(s.currentIndex>=s.words.length)s.completed=true;self.renderStudy();});})(abs[i]);}
  if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);
  var kh=function(e){if(s.completed)return;if(!s.revealed){if(e.key===' '||e.key==='Enter'){e.preventDefault();if(s.mode==='cn2en'){var cb=document.getElementById('cs');if(cb)cb.click();}else{s.revealed=true;self.renderStudy();}}}else{if(e.key==='1'){var b=document.querySelector('[data-action="unknown"]');if(b)b.click();}if(e.key==='2'){var b=document.querySelector('[data-action="fuzzy"]');if(b)b.click();}if(e.key==='3'){var b=document.querySelector('[data-action="know"]');if(b)b.click();}}};
  self._studyKeyHandler=kh;document.addEventListener('keydown',kh);
};

App.prototype.renderStats=function(){
  var libs=this.store.getUserLibraries();var ts=this.store.getTotalStats();var self=this;
  var tA=0,tM=0,tL=0,tN=0;libs.forEach(function(l){var s=self.store.getLibraryStats(l.id);tA+=s.total;tM+=s.mastered;tL+=s.learning;tN+=s.new_w;});
  var lp='';if(!libs.length)lp='<div class="empty-state"><p>暂无数据</p></div>';else libs.forEach(function(l){var s=self.store.getLibraryStats(l.id);var p=s.total>0?Math.round(s.mastered/s.total*100):0;lp+='<div style="margin-bottom:16px"><div class="flex justify-between items-center"><span style="font-size:14px;font-weight:500">'+l.name+'</span><span style="font-size:13px;color:var(--text-secondary)">'+s.mastered+'/'+s.total+' ('+p+'%)</span></div><div class="progress-bar"><div class="progress-bar-fill" style="width:'+p+'%;background:'+(p>=80?'var(--success)':p>=40?'var(--warning)':'var(--primary)')+'"></div></div></div>';});
  var main=document.getElementById('main-content');main.className='main-content';
  main.innerHTML='<div class="page-header"><h1>📈 数据统计</h1></div><div class="card-grid card-grid-4 mb-16"><div class="card stat-card"><div class="stat-icon" style="background:var(--primary-light)">📖</div><div class="stat-info"><h4 style="color:var(--primary)">'+ts.totalWords+'</h4><p>累计学习</p></div></div><div class="card stat-card"><div class="stat-icon" style="background:var(--success-light)">✅</div><div class="stat-info"><h4 style="color:var(--success)">'+tM+'</h4><p>已掌握</p></div></div><div class="card stat-card"><div class="stat-icon" style="background:var(--warning-light)">🔥</div><div class="stat-info"><h4 style="color:var(--warning)">'+ts.totalDays+'</h4><p>学习天数</p></div></div><div class="card stat-card"><div class="stat-icon" style="background:var(--danger-light)">🔄</div><div class="stat-info"><h4 style="color:var(--danger)">'+ts.totalReviews+'</h4><p>复习次数</p></div></div></div><div class="stats-grid"><div class="card stats-card"><div class="card-header"><h3>📊 学习趋势</h3><div class="mode-switch"><button class="active" data-range="7">7天</button><button data-range="14">14天</button><button data-range="30">30天</button></div></div><div style="height:240px" id="tcc"><canvas id="tc"></canvas></div></div><div class="card stats-card"><div class="card-header"><h3>🎯 掌握度</h3></div><div style="display:flex;align-items:center;justify-content:center;gap:32px;padding:16px 0"><div style="width:160px;height:160px" id="dcc"><canvas id="dc"></canvas></div><div><div class="donut-legend-item mb-12"><span class="dot" style="background:var(--success);width:14px;height:14px"></span> 已掌握 <strong>'+tM+'</strong></div><div class="donut-legend-item mb-12"><span class="dot" style="background:var(--warning);width:14px;height:14px"></span> 学习中 <strong>'+tL+'</strong></div><div class="donut-legend-item mb-12"><span class="dot" style="background:var(--border);width:14px;height:14px"></span> 未学 <strong>'+tN+'</strong></div></div></div></div><div class="card stats-card"><div class="card-header"><h3>📚 各词库进度</h3></div>'+lp+'</div><div class="card stats-card"><div class="card-header"><h3>📅 正确率</h3></div><div style="height:240px" id="acc"><canvas id="ac"></canvas></div></div></div>';
  var rtc=function(d){var cv=document.getElementById('tc');if(!cv)return;var recs=self.store.getRecords(d);var lb=[],dt=[];for(var i=d-1;i>=0;i--){var dd=getDaysAgo(i);lb.push(dd.slice(5));var rc=recs.find(function(r){return r.date===dd;});dt.push(rc?(rc.newCount+rc.reviewCount):0);}SC.bar(cv,lb,dt,'#409EFF');};
  setTimeout(function(){rtc(7);var dc=document.getElementById('dc');if(dc)SC.donut(dc,[tM,tL,tN],['#67C23A','#E6A23C','#DCDFE6']);var ac=document.getElementById('ac');if(ac){var recs=self.store.getRecords(7);var lb=[],dt=[];for(var i=6;i>=0;i--){var d=getDaysAgo(i);lb.push(d.slice(5));var rc=recs.find(function(r){return r.date===d;});dt.push(rc&&rc.totalCount>0?Math.round(rc.correctCount/rc.totalCount*100):0);}SC.line(ac,lb,[{data:dt,color:'#67C23A'}]);}},100);
  var rbs=document.querySelectorAll('[data-range]');for(var i=0;i<rbs.length;i++){(function(b){b.addEventListener('click',function(){for(var j=0;j<rbs.length;j++)rbs[j].classList.remove('active');b.classList.add('active');rtc(parseInt(b.getAttribute('data-range')));});})(rbs[i]);}
};

App.prototype.renderSettings=function(){
  var user=this.store.getCurrentUser();var libs=this.store.getUserLibraries();var plan=user.plan;var self=this;
  var lo='<option value="">未选择</option>';libs.forEach(function(l){lo+='<option value="'+l.id+'"'+(plan.libraryId===l.id?' selected':'')+'>'+l.name+'</option>';});
  var main=document.getElementById('main-content');main.className='main-content';
  main.innerHTML='<div class="page-header"><h1>⚙️ 设置</h1></div><div class="card mb-16" style="max-width:700px"><div class="settings-section"><h3>👤 个人信息</h3><div class="form-group"><label>昵称</label><input type="text" id="sn" value="'+user.nickname+'"></div><div class="form-group"><label>学习目标</label><input type="text" id="sg" value="'+(user.goal||'')+'" placeholder="例：3个月背完考研单词"></div><button class="btn btn-primary" id="sp">保存</button></div></div><div class="card mb-16" style="max-width:700px"><div class="settings-section"><h3>📅 背诵计划</h3><div class="setting-item"><label>默认词库</label><div><select id="spl" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px">'+lo+'</select></div></div><div class="setting-item"><label>每日新词数</label><div class="number-input"><button id="dm">−</button><span id="dc2">'+plan.dailyNew+'</span><button id="dp">＋</button></div></div><div class="setting-item"><label>学习提醒</label><div class="toggle'+(plan.reminderEnabled?' active':'')+'" id="rt"></div></div><button class="btn btn-primary mt-12" id="spp">保存计划</button></div></div><div class="card mb-16" style="max-width:700px"><div class="settings-section"><h3>🔐 账号</h3><div class="form-group"><label>邮箱</label><input value="'+user.email+'" disabled style="background:var(--bg)"></div><div class="form-group"><label>新密码</label><input type="password" id="np" placeholder="留空不修改"></div><div class="form-group"><label>确认密码</label><input type="password" id="np2" placeholder="确认新密码"></div><button class="btn btn-primary" id="sps">修改密码</button><button class="btn btn-danger" id="lo" style="margin-left:12px">退出登录</button></div></div>';
  document.getElementById('sp').addEventListener('click',function(){var n=(document.getElementById('sn').value||'').trim();var g=(document.getElementById('sg').value||'').trim();if(!n)return showToast('昵称不能为空','error');self.store.updateUser({nickname:n,goal:g,avatar:n.charAt(0).toUpperCase()});showToast('已保存','success');self.renderMainLayout();setTimeout(function(){var s=document.querySelector('[data-page="settings"]');if(s)s.click();},50);});
  var dailyNew=plan.dailyNew;document.getElementById('dm').addEventListener('click',function(){dailyNew=Math.max(5,dailyNew-5);document.getElementById('dc2').textContent=dailyNew;});document.getElementById('dp').addEventListener('click',function(){dailyNew=Math.min(200,dailyNew+5);document.getElementById('dc2').textContent=dailyNew;});
  var re=plan.reminderEnabled;document.getElementById('rt').addEventListener('click',function(e){re=!re;e.target.classList.toggle('active',re);});
  document.getElementById('spp').addEventListener('click',function(){self.store.updateUser({plan:{libraryId:document.getElementById('spl').value||null,dailyNew:dailyNew,reminderEnabled:re,reminderTime:plan.reminderTime}});showToast('计划已保存','success');});
  document.getElementById('sps').addEventListener('click',async function(){var p1=document.getElementById('np').value;var p2=document.getElementById('np2').value;if(!p1)return showToast('请输入新密码','error');if(p1.length<6)return showToast('密码至少6位','error');if(p1!==p2)return showToast('密码不一致','error');var r=await self.store.changePassword(p1);if(!r.ok)return showToast(r.msg,'error');showToast('密码已修改','success');});
  document.getElementById('lo').addEventListener('click',async function(){await self.store.logout();if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);self.studyState=null;self.renderAuth();showToast('已退出','info');});
};

// ============================================================
// INIT
// ============================================================
(async function(){var app=new App();await app.init();window.addEventListener('resize',function(){if(app.currentPage==='dashboard'||app.currentPage==='stats'){clearTimeout(window._rt);window._rt=setTimeout(function(){app.renderPage();},300);}});})();
</script>
