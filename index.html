function CloudStore(){
  this.db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  this.authUser=null;
  this.profile=null;
  this.libraries=[];
  this.progress={};
  this.records=[];
}
CloudStore.prototype.checkSession=async function(){
  var r=await this.db.auth.getSession();
  if(r.data.session){this.authUser=r.data.session.user;return true;}return false;
};
CloudStore.prototype.register=async function(email,pw,nickname){
  var r=await this.db.auth.signUp({email:email,password:pw});
  if(r.error)return{ok:false,msg:transErr(r.error.message)};
  this.authUser=r.data.user;
  var pr={id:this.authUser.id,email:email,nickname:nickname,avatar:nickname.charAt(0).toUpperCase(),goal:'',goal_months:3,plan:{libraryId:null,dailyNew:20,reminderEnabled:false,reminderTime:'08:00'}};
  var ir=await this.db.from('profiles').insert(pr);
  if(ir.error)return{ok:false,msg:ir.error.message};
  return{ok:true};
};
CloudStore.prototype.login=async function(email,pw){
  var r=await this.db.auth.signInWithPassword({email:email,password:pw});
  if(r.error)return{ok:false,msg:transErr(r.error.message)};
  this.authUser=r.data.user;return{ok:true};
};
CloudStore.prototype.logout=async function(){
  await this.db.auth.signOut();this.authUser=null;this.profile=null;this.libraries=[];this.progress={};this.records=[];
};
CloudStore.prototype.loadAllData=async function(){
  var uid=this.authUser.id;
  var pr=await this.db.from('profiles').select('*').eq('id',uid).single();
  if(pr.data){var p=pr.data;this.profile={id:p.id,email:p.email,nickname:p.nickname,avatar:p.avatar||p.nickname.charAt(0).toUpperCase(),goal:p.goal||'',goalMonths:p.goal_months||3,plan:p.plan||{libraryId:null,dailyNew:20,reminderEnabled:false,reminderTime:'08:00'}};}
  var lr=await this.db.from('user_libraries').select('*').eq('user_id',uid);
  this.libraries=(lr.data||[]).map(function(l){return{id:l.id,name:l.name,type:l.type,sourceId:l.source_id,category:l.category||'',difficulty:l.difficulty||0,words:l.words||[]};});
  var pgr=await this.db.from('word_progress').select('*').eq('user_id',uid);
  this.progress={};var self=this;(pgr.data||[]).forEach(function(p){var k=p.library_id+'::'+p.word_english;self.progress[k]={status:p.status||'new',interval:p.interval_level||0,nextReview:p.next_review||getToday(),reviewCount:p.review_count||0,correctCount:p.correct_count||0,lastReview:p.last_review||null};});
  var rr=await this.db.from('study_records').select('*').eq('user_id',uid);
  this.records=(rr.data||[]).map(function(r){return{date:r.record_date,newCount:r.new_count||0,reviewCount:r.review_count||0,correctCount:r.correct_count||0,totalCount:r.total_count||0};});
};
CloudStore.prototype.getCurrentUser=function(){return this.profile;};
CloudStore.prototype.getUserLibraries=function(){return this.libraries;};
CloudStore.prototype.getLibrary=function(id){return this.libraries.find(function(l){return l.id===id;})||null;};
CloudStore.prototype.updateUser=function(updates){
  if(!this.profile)return;for(var k in updates)this.profile[k]=updates[k];
  var d={};if(updates.nickname!==undefined)d.nickname=updates.nickname;if(updates.avatar!==undefined)d.avatar=updates.avatar;
  if(updates.goal!==undefined)d.goal=updates.goal;if(updates.goalMonths!==undefined)d.goal_months=updates.goalMonths;
  if(updates.plan!==undefined)d.plan=updates.plan;
  if(Object.keys(d).length>0)this.db.from('profiles').update(d).eq('id',this.authUser.id).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.addSystemLibrary=function(sysId){
  if(this.libraries.find(function(l){return l.sourceId===sysId;}))return;
  var sys=SYSTEM_LIBRARIES.find(function(l){return l.id===sysId;});if(!sys)return;
  var lib={id:'lib_'+Date.now(),name:sys.name,type:'system',sourceId:sys.id,category:sys.category,difficulty:sys.difficulty,words:JSON.parse(JSON.stringify(sys.words))};
  this.libraries.push(lib);
  this.db.from('user_libraries').insert({id:lib.id,user_id:this.authUser.id,name:lib.name,type:lib.type,source_id:lib.sourceId,category:lib.category,difficulty:lib.difficulty,words:lib.words}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.addCustomLibrary=function(name,words){
  var lib={id:'lib_'+Date.now(),name:name,type:'custom',sourceId:null,category:'Ťá™ŚģöšĻČ',difficulty:0,words:words||[]};
  this.libraries.push(lib);
  this.db.from('user_libraries').insert({id:lib.id,user_id:this.authUser.id,name:lib.name,type:lib.type,source_id:null,category:lib.category,difficulty:0,words:lib.words}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.removeLibrary=function(libId){
  this.libraries=this.libraries.filter(function(l){return l.id!==libId;});
  this.db.from('user_libraries').delete().eq('id',libId).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.addWordToLibrary=function(libId,word){
  var lib=this.getLibrary(libId);if(!lib)return;lib.words.push(word);
  this.db.from('user_libraries').update({words:lib.words}).eq('id',libId).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.removeWordFromLibrary=function(libId,idx){
  var lib=this.getLibrary(libId);if(!lib)return;lib.words.splice(idx,1);
  this.db.from('user_libraries').update({words:lib.words}).eq('id',libId).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.getWordProgress=function(libId,w){return this.progress[libId+'::'+w]||null;};
CloudStore.prototype.updateWordProgress=function(libId,wordEn,action){
  var key=libId+'::'+wordEn;
  var prog=this.progress[key]||{status:'new',interval:0,nextReview:getToday(),reviewCount:0,correctCount:0,lastReview:null};
  prog.reviewCount++;prog.lastReview=getToday();
  if(action==='know'){prog.correctCount++;prog.interval=Math.min(prog.interval+1,EBBINGHAUS_INTERVALS.length-1);prog.nextReview=getNextReviewDate(prog.interval);prog.status=prog.interval>=EBBINGHAUS_INTERVALS.length-1?'mastered':'learning';}
  else if(action==='unknown'){prog.interval=0;prog.nextReview=getToday();prog.status='learning';}
  else{prog.nextReview=getToday();prog.status='learning';}
  this.progress[key]=prog;
  this.db.from('word_progress').upsert({user_id:this.authUser.id,library_id:libId,word_english:wordEn,status:prog.status,interval_level:prog.interval,next_review:prog.nextReview,review_count:prog.reviewCount,correct_count:prog.correctCount,last_review:prog.lastReview},{onConflict:'user_id,library_id,word_english'}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.getLibraryStats=function(libId){
  var lib=this.getLibrary(libId);if(!lib)return{total:0,mastered:0,learning:0,new_w:0};
  var m=0,l=0,n=0;var self=this;lib.words.forEach(function(w){var p=self.progress[libId+'::'+w.english];if(!p||p.status==='new')n++;else if(p.status==='mastered')m++;else l++;});
  return{total:lib.words.length,mastered:m,learning:l,new_w:n};
};
CloudStore.prototype.getTodayWords=function(libId,dailyNew){
  var lib=this.getLibrary(libId);if(!lib)return{review:[],newWords:[]};
  var today=getToday(),review=[],newWords=[];var self=this;
  lib.words.forEach(function(w){var p=self.progress[libId+'::'+w.english];if(!p||p.status==='new')newWords.push(w);else if(p.nextReview<=today)review.push(w);});
  return{review:review,newWords:newWords.slice(0,dailyNew||20)};
};
CloudStore.prototype.addRecord=function(rec){
  var today=getToday();var existing=this.records.find(function(r){return r.date===today;});
  if(existing){existing.newCount+=(rec.newCount||0);existing.reviewCount+=(rec.reviewCount||0);existing.correctCount+=(rec.correctCount||0);existing.totalCount+=(rec.totalCount||0);}
  else{var nr={date:today,newCount:rec.newCount||0,reviewCount:rec.reviewCount||0,correctCount:rec.correctCount||0,totalCount:rec.totalCount||0};this.records.push(nr);existing=nr;}
  this.db.from('study_records').upsert({user_id:this.authUser.id,record_date:today,new_count:existing.newCount,review_count:existing.reviewCount,correct_count:existing.correctCount,total_count:existing.totalCount},{onConflict:'user_id,record_date'}).then(function(r){if(r.error)console.error('Sync:',r.error);});
};
CloudStore.prototype.getRecords=function(days){var since=getDaysAgo(days);return this.records.filter(function(r){return r.date>=since;}).sort(function(a,b){return a.date.localeCompare(b.date);});};
CloudStore.prototype.getTodayRecord=function(){return this.records.find(function(r){return r.date===getToday();})||{date:getToday(),newCount:0,reviewCount:0,correctCount:0,totalCount:0};};
CloudStore.prototype.getTotalStats=function(){var tw=0;for(var k in this.progress)if(this.progress[k].status!=='new')tw++;var td=[];this.records.forEach(function(r){if(td.indexOf(r.date)===-1)td.push(r.date);});var tr=0;this.records.forEach(function(r){tr+=(r.totalCount||0);});return{totalWords:tw,totalDays:td.length,totalReviews:tr};};
CloudStore.prototype.changePassword=async function(np){var r=await this.db.auth.updateUser({password:np});if(r.error)return{ok:false,msg:r.error.message};return{ok:true};};

  if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);
  var kh=function(e){if(s.completed)return;if(!s.revealed){if(e.key===' '||e.key==='Enter'){e.preventDefault();if(s.mode==='cn2en'){var cb=document.getElementById('cs');if(cb)cb.click();}else{s.revealed=true;self.renderStudy();}}}else{if(e.key==='1'){var b=document.querySelector('[data-action="unknown"]');if(b)b.click();}if(e.key==='2'){var b=document.querySelector('[data-action="fuzzy"]');if(b)b.click();}if(e.key==='3'){var b=document.querySelector('[data-action="know"]');if(b)b.click();}}};
  self._studyKeyHandler=kh;document.addEventListener('keydown',kh);
};

App.prototype.renderStats=function(){
  var libs=this.store.getUserLibraries();var ts=this.store.getTotalStats();var self=this;
  var tA=0,tM=0,tL=0,tN=0;libs.forEach(function(l){var s=self.store.getLibraryStats(l.id);tA+=s.total;tM+=s.mastered;tL+=s.learning;tN+=s.new_w;});
  var lp='';if(!libs.length)lp='<div class="empty-state"><p>śöāśó†śēįśćģ</p></div>';else libs.forEach(function(l){var s=self.store.getLibraryStats(l.id);var p=s.total>0?Math.round(s.mastered/s.total*100):0;lp+='<div style="margin-bottom:16px"><div class="flex justify-between items-center"><span style="font-size:14px;font-weight:500">'+l.name+'</span><span style="font-size:13px;color:var(--text-secondary)">'+s.mastered+'/'+s.total+' ('+p+'%)</span></div><div class="progress-bar"><div class="progress-bar-fill" style="width:'+p+'%;background:'+(p>=80?'var(--success)':p>=40?'var(--warning)':'var(--primary)')+'"></div></div></div>';});
  var main=document.getElementById('main-content');main.className='main-content';
  main.innerHTML='<div class="page-header"><h1>ūüďą śēįśćģÁĽüŤģ°</h1></div><div class="card-grid card-grid-4 mb-16"><div class="card stat-card"><div class="stat-icon" style="background:var(--primary-light)">ūüďĖ</div><div class="stat-info"><h4 style="color:var(--primary)">'+ts.totalWords+'</h4><p>ÁīĮŤģ°Ś≠¶šĻ†</p></div></div><div class="card stat-card"><div class="stat-icon" style="background:var(--success-light)">‚úÖ</div><div class="stat-info"><h4 style="color:var(--success)">'+tM+'</h4><p>Ś∑≤śéĆśŹ°</p></div></div><div class="card stat-card"><div class="stat-icon" style="background:var(--warning-light)">ūüĒ•</div><div class="stat-info"><h4 style="color:var(--warning)">'+ts.totalDays+'</h4><p>Ś≠¶šĻ†Ś§©śēį</p></div></div><div class="card stat-card"><div class="stat-icon" style="background:var(--danger-light)">ūüĒĄ</div><div class="stat-info"><h4 style="color:var(--danger)">'+ts.totalReviews+'</h4><p>Ś§ćšĻ†ś¨°śēį</p></div></div></div><div class="stats-grid"><div class="card stats-card"><div class="card-header"><h3>ūüďä Ś≠¶šĻ†Ť∂čŚäŅ</h3><div class="mode-switch"><button class="active" data-range="7">7Ś§©</button><button data-range="14">14Ś§©</button><button data-range="30">30Ś§©</button></div></div><div style="height:240px" id="tcc"><canvas id="tc"></canvas></div></div><div class="card stats-card"><div class="card-header"><h3>ūüéĮ śéĆśŹ°Śļ¶</h3></div><div style="display:flex;align-items:center;justify-content:center;gap:32px;padding:16px 0"><div style="width:160px;height:160px" id="dcc"><canvas id="dc"></canvas></div><div><div class="donut-legend-item mb-12"><span class="dot" style="background:var(--success);width:14px;height:14px"></span> Ś∑≤śéĆśŹ° <strong>'+tM+'</strong></div><div class="donut-legend-item mb-12"><span class="dot" style="background:var(--warning);width:14px;height:14px"></span> Ś≠¶šĻ†šł≠ <strong>'+tL+'</strong></div><div class="donut-legend-item mb-12"><span class="dot" style="background:var(--border);width:14px;height:14px"></span> śú™Ś≠¶ <strong>'+tN+'</strong></div></div></div></div><div class="card stats-card"><div class="card-header"><h3>ūüďö ŚźĄŤĮćŚļďŤŅõŚļ¶</h3></div>'+lp+'</div><div class="card stats-card"><div class="card-header"><h3>ūüďÖ ś≠£Á°ģÁéá</h3></div><div style="height:240px" id="acc"><canvas id="ac"></canvas></div></div></div>';
  var rtc=function(d){var cv=document.getElementById('tc');if(!cv)return;var recs=self.store.getRecords(d);var lb=[],dt=[];for(var i=d-1;i>=0;i--){var dd=getDaysAgo(i);lb.push(dd.slice(5));var rc=recs.find(function(r){return r.date===dd;});dt.push(rc?(rc.newCount+rc.reviewCount):0);}SC.bar(cv,lb,dt,'#409EFF');};
  setTimeout(function(){rtc(7);var dc=document.getElementById('dc');if(dc)SC.donut(dc,[tM,tL,tN],['#67C23A','#E6A23C','#DCDFE6']);var ac=document.getElementById('ac');if(ac){var recs=self.store.getRecords(7);var lb=[],dt=[];for(var i=6;i>=0;i--){var d=getDaysAgo(i);lb.push(d.slice(5));var rc=recs.find(function(r){return r.date===d;});dt.push(rc&&rc.totalCount>0?Math.round(rc.correctCount/rc.totalCount*100):0);}SC.line(ac,lb,[{data:dt,color:'#67C23A'}]);}},100);
  var rbs=document.querySelectorAll('[data-range]');for(var i=0;i<rbs.length;i++){(function(b){b.addEventListener('click',function(){for(var j=0;j<rbs.length;j++)rbs[j].classList.remove('active');b.classList.add('active');rtc(parseInt(b.getAttribute('data-range')));});})(rbs[i]);}
};

App.prototype.renderSettings=function(){
  var user=this.store.getCurrentUser();var libs=this.store.getUserLibraries();var plan=user.plan;var self=this;
  var lo='<option value="">śú™ťÄČśč©</option>';libs.forEach(function(l){lo+='<option value="'+l.id+'"'+(plan.libraryId===l.id?' selected':'')+'>'+l.name+'</option>';});
  var main=document.getElementById('main-content');main.className='main-content';
  main.innerHTML='<div class="page-header"><h1>‚öôÔłŹ ŤģĺÁĹģ</h1></div><div class="card mb-16" style="max-width:700px"><div class="settings-section"><h3>ūüĎ§ šł™šļļšŅ°śĀĮ</h3><div class="form-group"><label>śėĶÁßį</label><input type="text" id="sn" value="'+user.nickname+'"></div><div class="form-group"><label>Ś≠¶šĻ†Áõģś†á</label><input type="text" id="sg" value="'+(user.goal||'')+'" placeholder="šĺčÔľö3šł™śúąŤÉĆŚģĆŤÄÉÁ†ĒŚćēŤĮć"></div><button class="btn btn-primary" id="sp">šŅĚŚ≠ė</button></div></div><div class="card mb-16" style="max-width:700px"><div class="settings-section"><h3>ūüďÖ ŤÉĆŤĮĶŤģ°Śąí</h3><div class="setting-item"><label>ťĽėŤģ§ŤĮćŚļď</label><div><select id="spl" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px">'+lo+'</select></div></div><div class="setting-item"><label>śĮŹśó•śĖįŤĮćśēį</label><div class="number-input"><button id="dm">‚ąí</button><span id="dc2">'+plan.dailyNew+'</span><button id="dp">Ôľč</button></div></div><div class="setting-item"><label>Ś≠¶šĻ†śŹźťÜí</label><div class="toggle'+(plan.reminderEnabled?' active':'')+'" id="rt"></div></div><button class="btn btn-primary mt-12" id="spp">šŅĚŚ≠ėŤģ°Śąí</button></div></div><div class="card mb-16" style="max-width:700px"><div class="settings-section"><h3>ūüĒź Ťī¶ŚŹ∑</h3><div class="form-group"><label>ťāģÁģĪ</label><input value="'+user.email+'" disabled style="background:var(--bg)"></div><div class="form-group"><label>śĖįŚĮÜÁ†Ā</label><input type="password" id="np" placeholder="ÁēôÁ©ļšłćšŅģśĒĻ"></div><div class="form-group"><label>Á°ģŤģ§ŚĮÜÁ†Ā</label><input type="password" id="np2" placeholder="Á°ģŤģ§śĖįŚĮÜÁ†Ā"></div><button class="btn btn-primary" id="sps">šŅģśĒĻŚĮÜÁ†Ā</button><button class="btn btn-danger" id="lo" style="margin-left:12px">ťÄÄŚáļÁôĽŚĹē</button></div></div>';
  document.getElementById('sp').addEventListener('click',function(){var n=(document.getElementById('sn').value||'').trim();var g=(document.getElementById('sg').value||'').trim();if(!n)return showToast('śėĶÁßįšłćŤÉĹšłļÁ©ļ','error');self.store.updateUser({nickname:n,goal:g,avatar:n.charAt(0).toUpperCase()});showToast('Ś∑≤šŅĚŚ≠ė','success');self.renderMainLayout();setTimeout(function(){var s=document.querySelector('[data-page="settings"]');if(s)s.click();},50);});
  var dailyNew=plan.dailyNew;document.getElementById('dm').addEventListener('click',function(){dailyNew=Math.max(5,dailyNew-5);document.getElementById('dc2').textContent=dailyNew;});document.getElementById('dp').addEventListener('click',function(){dailyNew=Math.min(200,dailyNew+5);document.getElementById('dc2').textContent=dailyNew;});
  var re=plan.reminderEnabled;document.getElementById('rt').addEventListener('click',function(e){re=!re;e.target.classList.toggle('active',re);});
  document.getElementById('spp').addEventListener('click',function(){self.store.updateUser({plan:{libraryId:document.getElementById('spl').value||null,dailyNew:dailyNew,reminderEnabled:re,reminderTime:plan.reminderTime}});showToast('Ťģ°ŚąíŚ∑≤šŅĚŚ≠ė','success');});
  document.getElementById('sps').addEventListener('click',async function(){var p1=document.getElementById('np').value;var p2=document.getElementById('np2').value;if(!p1)return showToast('ŤĮ∑ŤĺďŚÖ•śĖįŚĮÜÁ†Ā','error');if(p1.length<6)return showToast('ŚĮÜÁ†ĀŤá≥ŚįĎ6šĹć','error');if(p1!==p2)return showToast('ŚĮÜÁ†ĀšłćšłÄŤáī','error');var r=await self.store.changePassword(p1);if(!r.ok)return showToast(r.msg,'error');showToast('ŚĮÜÁ†ĀŚ∑≤šŅģśĒĻ','success');});
  document.getElementById('lo').addEventListener('click',async function(){await self.store.logout();if(self._studyKeyHandler)document.removeEventListener('keydown',self._studyKeyHandler);self.studyState=null;self.renderAuth();showToast('Ś∑≤ťÄÄŚáļ','info');});
};
